# Recovery agent configuration.
# Which models to watch is owned by the control center (watched_models.yaml);
# this file holds agent-side behavior only.

policy:
  min_interval_hours: 1      # don't re-trigger the same loader more often
  max_attempts_per_day: 4    # client-side cap (server is authoritative)

escalation:
  # Where the agent posts its summary when a human needs to act.
  slack_channel: "#data-alerts"

model: "anthropic/claude-opus-4-8"   # overridable via EDCA_MODEL
